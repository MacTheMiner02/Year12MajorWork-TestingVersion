<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <nav class="navbar">
            <div class="left">
                <a href="/">Home</a>
                <a href="/about">About</a>
            </div>
            <div class="right">
                {% if current_user.is_authenticated %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/logout">Log Out</a>
                {% else %}
                    <a href="/login">Sign In</a>
                    <a href="/sign-up">Sign Up</a>
                {% endif %}
            </div>
        </nav>

    <main class="content">
        <div class="loginPage">
            <div class="centerBox">
                <h1 class="signInText">
                Do you want to create a band account or a host account?
                </h1>
                <a href="/band-creation"><button class="loginButton">Band</button></a>
                <a href="/host-account-creation"><button class="loginButton">Host</button></a>
            </div>
        </div>
    </main>
</body>
</html>
