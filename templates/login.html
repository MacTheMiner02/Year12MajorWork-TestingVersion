<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <nav class="navbar">
            <div class="left">
                <a href="/">Home</a>
                <a href="/about">About</a>
            </div>
            <div class="right">
                {% if current_user.is_authenticated %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/logout">Log Out</a>
                {% else %}
                    <a href="/login">Sign In</a>
                    <a href="/sign-up">Sign Up</a>
                {% endif %}
            </div>
        </nav>

    <main class="content">
        <div class="loginPage">
            <div class="centerBox">
                <h1 class="signInText">
                Please enter your details
                </h1>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <p class="error-message">{{message}}</p>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                <form action="/login" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input class="account-creation-inputs" type="email" name="email" placeholder="Email">
                    <input class="account-creation-inputs" type="password" name="password" placeholder="Password">
                    <button class="account-creation-submit" type="submit">Submit</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
